<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Snakegame</title>
  </head>
  <body>
    <div class="page"></div>

    <div id="info-backdrop" class="backdrop notebook-bg info-fullscreen" role="dialog" aria-modal="true" style="display:flex; z-index:1500;">
      <button class="info-nav-button" onclick="hideInfo()">
        <svg class="snake-logo" viewBox="0 0 336 36" aria-hidden="true">
          <!-- Row 0 — extended back -->
          <rect x="12" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="24" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="36" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="48" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="84" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="96" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="108" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="120" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="156" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="168" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="180" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="192" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="228" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="240" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="252" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="264" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="300" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="312" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="324" y="0" width="12" height="12" rx="2" fill="#53d066"/>
          <!-- Row 1 -->
          <rect x="12" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="48" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="84" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="120" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="156" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="192" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="228" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="264" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="300" y="12" width="12" height="12" rx="2" fill="#53d066"/>
          <!-- Row 2 -->
          <rect x="0" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="12" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="48" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="60" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="72" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="84" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="120" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="132" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="144" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="156" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="192" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="204" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="216" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="228" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="264" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="276" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="288" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <rect x="300" y="24" width="12" height="12" rx="2" fill="#53d066"/>
          <!-- eyes on head -->
          <circle cx="334" cy="3.5" r="1.5" fill="white"/>
          <circle cx="334" cy="8.5" r="1.5" fill="white"/>
        </svg>
        <div class="logo-apple"></div>
        <span class="logo-title">SNAKEGAME</span>
        </svg>
      </button>
      <button class="info-nav-button" onclick="showTetrisMenu()">
        <canvas id="tetris-logo-canvas" class="tetris-logo-canvas"></canvas>
        <span class="logo-title">TETRIS</span>
      </button>
      <button class="info-nav-button" onclick="showTttMenu()">
        <canvas id="ttt-logo-canvas" class="tetris-logo-canvas"></canvas>
        <span class="logo-title">TIC TAC TOE</span>
      </button>
      <button class="info-nav-button" onclick="showBreakoutMenu()">
        <canvas id="breakout-logo-canvas" class="tetris-logo-canvas"></canvas>
        <span class="logo-title">PING PONG</span>
      </button>
      <button class="info-nav-button" onclick="showChessMenu()">
        <canvas id="chess-logo-canvas" class="tetris-logo-canvas"></canvas>
        <span class="logo-title">CHESS</span>
      </button>
      <button class="info-nav-button" onclick="showCheckersMenu()">
        <canvas id="checkers-logo-canvas" class="tetris-logo-canvas"></canvas>
        <span class="logo-title">CHECKERS</span>
      </button>
      <button class="info-nav-button" onclick="showGenericMenu()"></button>
      <button class="info-nav-button" onclick="showGenericMenu()"></button>
      <button class="info-nav-button" onclick="showGenericMenu()"></button>
      <button class="info-nav-button" onclick="showGenericMenu()"></button>
    </div>

    <div id="tetris-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Tetris Menu">
        <button class="menu-close" onclick="hideTetrisMenu()" aria-label="Back">✕</button>
        <div class="menu-title">TETRIS</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startTetris('easy')">Easy</button>
          <button class="menu-button" onclick="startTetris('normal')">Normal</button>
          <button class="menu-button" onclick="startTetris('hard')">Hard</button>
          <button class="menu-button" onclick="startTetris('impossible')">Impossible</button>
        </div>
      </div>
    </div>

    <div id="tetris-game-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="tetris-game-wrapper">
        <div class="win tetris-win" role="document" aria-label="Tetris">
          <div class="win-header">
            <div class="win-title">TETRIS</div>
            <div class="win-stats">
              <span id="tetris-score-display">Score: 0</span>
              <span id="tetris-timer-display">0:00</span>
            </div>
            <div class="win-controls">
              <button class="mobile-pause-btn" onclick="mobilePauseTetris()" aria-label="Pause">☰</button>
              <span class="ctrl min"></span>
              <span class="ctrl max"></span>
            </div>
          </div>
          <div class="win-body">
            <div id="tetris-grid" class="grid" aria-hidden="true"></div>
          </div>
          <div id="tetris-pause-overlay" class="tetris-overlay" style="display:none;">
            <div class="pause-win" role="document" aria-label="Tetris Pause">
              <div class="pause-title">Game Paused</div>
              <div id="tetris-pause-score" class="best-score"></div>
              <div class="pause-buttons">
                <button class="pause-button" onclick="quitTetris()">QUIT</button>
                <button class="pause-button" onclick="resumeTetris()">RESUME</button>
              </div>
            </div>
          </div>
          <div id="tetris-gameover-overlay" class="tetris-overlay" style="display:none;">
            <div class="gameover-win" role="document" aria-label="Tetris Game Over">
              <div class="gameover-title">You lost!</div>
              <div id="tetris-gameover-score" class="best-score"></div>
              <div id="tetris-gameover-time" class="best-score"></div>
              <div class="gameover-buttons">
                <button class="gameover-button" onclick="retryTetris()">RETRY</button>
                <button class="gameover-button" onclick="quitTetrisFromGameover()">MENU</button>
              </div>
            </div>
          </div>
        </div>
        <div class="tetris-side-panel">
          <div class="tetris-next-label">NEXT</div>
          <div id="tetris-next-preview" class="tetris-next-box"></div>
        </div>
      </div>
    </div>

    <div id="breakout-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win breakout-level-menu" role="document" aria-label="Breakout Levels">
        <button class="menu-close" onclick="hideBreakoutMenu()" aria-label="Back">✕</button>
        <div class="menu-title">PING PONG</div>
        <div class="menu-buttons breakout-levels" id="breakout-level-list"></div>
      </div>
    </div>

    <div id="breakout-game-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="win breakout-win" role="document" aria-label="Breakout">
        <div class="win-header">
          <div class="win-title">PING PONG</div>
          <div class="win-stats">
            <span id="breakout-level-display">Level: 1</span>
            <span id="breakout-lives-display">❤❤❤</span>
            <span id="breakout-score-display">Score: 0</span>
          </div>
          <div class="win-controls">
            <button class="mobile-pause-btn" onclick="mobilePauseBreakout()" aria-label="Pause">☰</button>
            <span class="ctrl min"></span>
            <span class="ctrl max"></span>
          </div>
        </div>
        <div class="win-body">
          <canvas id="breakout-canvas" width="700" height="800"></canvas>
        </div>
        <div id="breakout-pause-overlay" class="tetris-overlay" style="display:none;">
          <div class="pause-win">
            <div class="pause-title">Game Paused</div>
            <div id="breakout-pause-score" class="best-score"></div>
            <div class="pause-buttons">
              <button class="pause-button" onclick="quitBreakout()">QUIT</button>
              <button class="pause-button" onclick="resumeBreakout()">RESUME</button>
            </div>
          </div>
        </div>
        <div id="breakout-result-overlay" class="tetris-overlay" style="display:none;">
          <div id="breakout-result-win" class="gameover-win">
            <div id="breakout-result-title" class="gameover-title"></div>
            <div id="breakout-result-score" class="best-score"></div>
            <div class="gameover-buttons">
              <button id="breakout-retry-btn" class="gameover-button" onclick="retryBreakout()">RETRY</button>
              <button id="breakout-next-btn" class="gamewin-button" onclick="nextBreakoutLevel()" style="display:none">NEXT LEVEL</button>
              <button class="gameover-button" onclick="quitBreakout()">MENU</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="chess-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Chess Menu">
        <button class="menu-close" onclick="hideChessMenu()" aria-label="Back">✕</button>
        <div class="menu-title">CHESS</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startChess('easy')">Easy</button>
          <button class="menu-button" onclick="startChess('normal')">Normal</button>
          <button class="menu-button" onclick="startChess('hard')">Hard</button>
          <button class="menu-button" onclick="startChess('impossible')">Impossible</button>
        </div>
      </div>
    </div>

    <div id="chess-color-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Choose Color">
        <button class="menu-close" onclick="hideChessColor()" aria-label="Back">✕</button>
        <div class="menu-title">PLAY AS</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startChessColor('w')" style="background:#f0d9b5;color:#333">♔ White</button>
          <button class="menu-button" onclick="startChessColor('b')" style="background:#333;color:#f0d9b5">♚ Black</button>
        </div>
      </div>
    </div>

    <div id="chess-game-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="win chess-win" role="document" aria-label="Chess">
        <div class="win-header">
          <div class="win-title">CHESS</div>
          <div class="win-stats">
            <span id="chess-status">Your turn (White)</span>
          </div>
          <div class="win-controls">
            <button class="mobile-pause-btn" onclick="mobilePauseChess()" aria-label="Pause">☰</button>
            <span class="ctrl min"></span>
            <span class="ctrl max"></span>
          </div>
        </div>
        <div class="win-body chess-body">
          <div id="chess-board" class="chess-board"></div>
        </div>
        <div id="chess-pause-overlay" class="tetris-overlay" style="display:none;">
          <div class="pause-win">
            <div class="pause-title">Game Paused</div>
            <div class="pause-buttons">
              <button class="pause-button" onclick="quitChess()">QUIT</button>
              <button class="pause-button" onclick="resumeChess()">RESUME</button>
            </div>
          </div>
        </div>
        <div id="chess-result-overlay" class="tetris-overlay" style="display:none;">
          <div id="chess-result-win" class="gameover-win">
            <div id="chess-result-title" class="gameover-title"></div>
            <div class="gameover-buttons">
              <button id="chess-retry-btn" class="gameover-button" onclick="retryChess()">RETRY</button>
              <button class="gameover-button" onclick="quitChess()">MENU</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="checkers-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Checkers Menu">
        <button class="menu-close" onclick="hideCheckersMenu()" aria-label="Back">✕</button>
        <div class="menu-title">CHECKERS</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startCheckers('easy')">Easy</button>
          <button class="menu-button" onclick="startCheckers('normal')">Normal</button>
          <button class="menu-button" onclick="startCheckers('hard')">Hard</button>
          <button class="menu-button" onclick="startCheckers('impossible')">Impossible</button>
        </div>
      </div>
    </div>

    <div id="checkers-color-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Choose Color">
        <button class="menu-close" onclick="hideCheckersColor()" aria-label="Back">✕</button>
        <div class="menu-title">PLAY AS</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startCheckersColor('r')" style="background:#f0d9b5;color:#333">● White</button>
          <button class="menu-button" onclick="startCheckersColor('b')" style="background:#222;color:#fff">● Black</button>
        </div>
      </div>
    </div>

    <div id="checkers-game-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="win chess-win" role="document" aria-label="Checkers">
        <div class="win-header">
          <div class="win-title">CHECKERS</div>
          <div class="win-stats">
            <span id="checkers-status">Your turn</span>
          </div>
          <div class="win-controls">
            <button class="mobile-pause-btn" onclick="mobilePauseCheckers()" aria-label="Pause">☰</button>
            <span class="ctrl min"></span>
            <span class="ctrl max"></span>
          </div>
        </div>
        <div class="win-body chess-body">
          <div id="checkers-board" class="chess-board"></div>
        </div>
        <div id="checkers-pause-overlay" class="tetris-overlay" style="display:none;">
          <div class="pause-win">
            <div class="pause-title">Game Paused</div>
            <div class="pause-buttons">
              <button class="pause-button" onclick="quitCheckers()">QUIT</button>
              <button class="pause-button" onclick="resumeCheckers()">RESUME</button>
            </div>
          </div>
        </div>
        <div id="checkers-result-overlay" class="tetris-overlay" style="display:none;">
          <div class="gameover-win">
            <div id="checkers-result-title" class="gameover-title"></div>
            <div class="gameover-buttons">
              <button id="checkers-retry-btn" class="gameover-button" onclick="retryCheckers()">RETRY</button>
              <button class="gameover-button" onclick="quitCheckers()">MENU</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="generic-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Game Menu">
        <button class="menu-close" onclick="hideGenericMenu()" aria-label="Back">✕</button>
        <div class="menu-title">GAME</div>
        <div class="menu-buttons">
          <button class="menu-button" disabled style="opacity:0.5;cursor:not-allowed">Easy</button>
          <button class="menu-button" disabled style="opacity:0.5;cursor:not-allowed">Normal</button>
          <button class="menu-button" disabled style="opacity:0.5;cursor:not-allowed">Hard</button>
          <button class="menu-button" disabled style="opacity:0.5;cursor:not-allowed">Impossible</button>
        </div>
      </div>
    </div>

    <div id="ttt-menu-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="menu-win" role="document" aria-label="Tic Tac Toe Menu">
        <button class="menu-close" onclick="hideTttMenu()" aria-label="Back">✕</button>
        <div class="menu-title">TIC TAC TOE</div>
        <div class="menu-buttons">
          <button class="menu-button" onclick="startTtt('easy')">Easy</button>
          <button class="menu-button" onclick="startTtt('normal')">Normal</button>
          <button class="menu-button" onclick="startTtt('hard')">Hard</button>
          <button class="menu-button" onclick="startTtt('impossible')">Impossible</button>
        </div>
      </div>
    </div>

    <div id="ttt-game-backdrop" class="backdrop notebook-bg" role="dialog" aria-modal="true" style="display:none;">
      <div class="win ttt-win" role="document" aria-label="Tic Tac Toe">
        <div class="win-header">
          <div class="win-title">TIC TAC TOE</div>
          <div class="win-stats">
            <span id="ttt-status">Your turn (X)</span>
            <span id="ttt-wins-display">Wins: 0</span>
          </div>
          <div class="win-controls">
            <button class="mobile-pause-btn" onclick="mobilePauseTtt()" aria-label="Pause">☰</button>
            <span class="ctrl min"></span>
            <span class="ctrl max"></span>
          </div>
        </div>
        <div class="win-body ttt-body">
          <div id="ttt-grid" class="ttt-grid"></div>
        </div>
        <div id="ttt-pause-overlay" class="tetris-overlay" style="display:none;">
          <div class="pause-win" role="document" aria-label="Tic Tac Toe Pause">
            <div class="pause-title">Game Paused</div>
            <div id="ttt-pause-wins" class="best-score"></div>
            <div class="pause-buttons">
              <button class="pause-button" onclick="quitTtt()">QUIT</button>
              <button class="pause-button" onclick="resumeTtt()">RESUME</button>
            </div>
          </div>
        </div>
        <div id="ttt-result-overlay" class="tetris-overlay" style="display:none;">
          <div id="ttt-result-win" class="gameover-win" role="document" aria-label="Result">
            <div id="ttt-result-title" class="gameover-title"></div>
            <div id="ttt-result-wins" class="best-score"></div>
            <div class="gameover-buttons">
              <button id="ttt-retry-btn" class="gameover-button" onclick="retryTtt()">RETRY</button>
              <button id="ttt-quit-btn" class="gameover-button" onclick="quitTtt()">MENU</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
